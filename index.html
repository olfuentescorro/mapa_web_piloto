        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var Filters = {"Country": "str","State": "str","City": "str","Year": "str", "Elevation": "int","Model": "str","TDS": "int"};
        
        function filterFunc() {
            var features = json_Evaporation_Studies_1.features.slice(0);
            try{
              for (key in Filters){
                keyS = key.replace(/[^a-zA-Z0-9_]/g, "");
                
                // 1. Filtrado de Textos
                if (Filters[key] == "str" || Filters[key] == "bool"){
                  var selection = [];
                  var options = document.getElementById("sel_" + keyS).options;
                  for (var i=0; i < options.length; i++) {
                    if (options[i].selected) selection.push(options[i].value);
                  }
                  try{
                    if (key in features[0].properties){
                      for (i = features.length - 1; i >= 0; --i){
                        if (selection.indexOf(features[i].properties[key])<0 && selection.length>0) {
                          features.splice(i,1);
                        }
                      }
                    }
                  } catch(err){
                  }
                }
                
                // 2. Filtrado del Slider Numérico
                if (Filters[key] == "int"){
                  var sliderVals = document.getElementById("div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                      for (i = features.length - 1; i >= 0; --i){
                        if (parseInt(features[i].properties[key]) < sliderVals[0] || parseInt(features[i].properties[key]) > sliderVals[1]){
                          features.splice(i,1); 
                        }
                      }
                    }
                  } catch(err){
                  }
                }
              }
            } catch(err){
            }
            
            // -- INICIO LÓGICA DE FILTROS EN CASCADA DINÁMICA (OCULTAR NO DISPONIBLES) --
            for (var keyCascada in Filters) {
                if (Filters[keyCascada] == "str" || Filters[keyCascada] == "bool") {
                    var keySCascada = keyCascada.replace(/[^a-zA-Z0-9_]/g, "");
                    var selectElement = document.getElementById("sel_" + keySCascada);
                    
                    if (selectElement) {
                        // a. Recopilamos los valores actualmente seleccionados por el usuario en este menú
                        var seleccionadosPrevios = [];
                        for (var optIdx = 0; optIdx < selectElement.options.length; optIdx++) {
                            if (selectElement.options[optIdx].selected) {
                                seleccionadosPrevios.push(selectElement.options[optIdx].value);
                            }
                        }

                        // b. Listamos los valores válidos según los puntos que sobrevivieron al filtro general
                        var valoresDisponibles = [];
                        for (var j = 0; j < features.length; j++) {
                            var val = features[j].properties[keyCascada];
                            if (val !== null && val !== undefined) {
                                valoresDisponibles.push(String(val));
                            }
                        }

                        // c. Obtenemos todas las opciones maestras originales de esta columna ordenadas de la A a la Z
                        // (Nos basamos en el archivo base para no perder opciones al deseleccionar)
                        var unicosGlobales = new Set();
                        json_Evaporation_Studies_1.features.forEach(function(f) {
                            var v = f.properties[keyCascada];
                            if (v !== null && v !== undefined && String(v).trim() !== "") {
                                unicosGlobales.add(String(v));
                            }
                        });

                        var opcionesOrdenadas = Array.from(unicosGlobales).sort(function(a, b) {
                            return a.localeCompare(b);
                        });

                        // d. Reconstruimos las opciones del menú: solo mostramos las disponibles o las que ya están seleccionadas
                        selectElement.innerHTML = "";
                        opcionesOrdenadas.forEach(function(valTexto) {
                            var estaDisponible = valoresDisponibles.indexOf(valTexto) !== -1;
                            var estaSeleccionado = seleccionadosPrevios.indexOf(valTexto) !== -1;

                            // Mostramos la opción si hay datos disponibles para ella O si el usuario ya la tenía marcada
                            if (estaDisponible || estaSeleccionado) {
                                var option = document.createElement('option');
                                option.value = valTexto;
                                option.text = valTexto;
                                option.selected = estaSeleccionado; // Mantiene la selección del usuario
                                selectElement.appendChild(option);
                            }
                        });
                    }
                }
            }
            // -- FIN LÓGICA DE FILTROS EN CASCADA DINÁMICA --

            // 3. Actualización del Mapa y Clústeres
            cluster_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.addData(features);
            cluster_Evaporation_Studies_1.addLayer(layer_Evaporation_Studies_1);
        }

// -- INICIO DE SLIDERS DINÁMICOS E INTERACTIVOS (ELEVATION Y TDS) --
            // 1. Función para escanear el archivo de datos y obtener el Mínimo y Máximo real
            function obtenerMinMax(features, propiedad) {
                var valores = features.map(function(f) { return parseFloat(f.properties[propiedad]); })
                                      .filter(function(v) { return !isNaN(v); });
                if (valores.length === 0) return [0, 100]; // Seguridad por si no hay datos
                var min = Math.min.apply(null, valores);
                var max = Math.max.apply(null, valores);
                if (min === max) max = min + 1; // Evita que el slider colapse si todos los valores son iguales
                return [min, max];
            }
            
            var featuresData = json_Evaporation_Studies_1.features;
            
            // 2. Función maestra creadora de sliders híbridos (Barra + Cajas de texto)
            function crearSliderDinamico(idVariable, titulo, paso) {
                var limites = obtenerMinMax(featuresData, idVariable);
                var minReal = limites[0];
                var maxReal = limites[1];

                var divContenedor = document.createElement('div');
                divContenedor.id = "div_" + idVariable;
                divContenedor.className= "filterselect";
                document.getElementById("menu").appendChild(divContenedor);
                
                // Etiqueta del título
                var labTitulo = document.createElement('div');
                labTitulo.innerHTML = titulo;
                labTitulo.className = 'filterlabel';
                divContenedor.appendChild(labTitulo);

                // Contenedor para las cajas de texto (Inputs)
                var divInputs = document.createElement('div');
                divInputs.style.display = "flex";
                divInputs.style.justifyContent = "space-between";
                divInputs.style.width = "90%";
                divInputs.style.marginBottom = "10px";
                divInputs.style.marginTop = "5px";

                // Input para el valor Mínimo
                var inputMin = document.createElement('input');
                inputMin.type = "number";
                inputMin.style.width = "45%";
                inputMin.min = minReal;
                inputMin.max = maxReal;
                inputMin.title = "Min " + titulo;

                // Input para el valor Máximo
                var inputMax = document.createElement('input');
                inputMax.type = "number";
                inputMax.style.width = "45%";
                inputMax.min = minReal;
                inputMax.max = maxReal;
                inputMax.title = "Max " + titulo;

                divInputs.appendChild(inputMin);
                divInputs.appendChild(inputMax);
                divContenedor.appendChild(divInputs);
                
                // Contenedor visual de la barra deslizante
                var divSlider = document.createElement('div');
                divSlider.style.marginTop = "10px";
                divSlider.style.marginBottom = "10px";
                divSlider.style.width = "90%";
                divContenedor.appendChild(divSlider);

                // Inicialización del motor de la barra
                noUiSlider.create(divSlider, {
                    start: [minReal, maxReal], 
                    connect: true,
                    range: { 'min': minReal, 'max': maxReal },
                    step: paso,
                    format: wNumb({ decimals: 0 })
                });

                divContenedor.noUiSlider = divSlider.noUiSlider;

                // A) Sincronización: Al mover el slider, se actualizan las cajas de texto
                divSlider.noUiSlider.on('update', function (values, handle) {
                    if (handle === 0) {
                        inputMin.value = values[0];
                    } else {
                        inputMax.value = values[1];
                    }
                });

                // B) Sincronización: Al escribir en las cajas de texto, se mueve el slider y SE APLICA EL FILTRO
                inputMin.addEventListener('change', function () {
                    divSlider.noUiSlider.set([this.value, null]);
                    filterFunc(); // Fuerza la actualización del mapa
                });
                inputMax.addEventListener('change', function () {
                    divSlider.noUiSlider.set([null, this.value]);
                    filterFunc(); // Fuerza la actualización del mapa
                });

                // C) Conectar el Slider al motor de filtros del mapa
                divSlider.noUiSlider.on('change', function() { filterFunc() });
                
                // Botón para limpiar el filtro
                var btnReset = document.createElement('div');
                btnReset.innerHTML = 'clear filter';
                btnReset.className = 'filterlabel';
                btnReset.onclick = function() {
                    divSlider.noUiSlider.reset(); // Regresa la barra a sus límites reales
                    filterFunc(); // Refresca el mapa
                };
                divContenedor.appendChild(btnReset);
            }

            // 3. Ejecutamos la función para fabricar los dos paneles matemáticos en pantalla
            crearSliderDinamico('Elevation', 'Elevation (m)', 1); // Pasos de 1 metro
            crearSliderDinamico('TDS', 'TDS', 1); // Pasos de 1 ppm
 // -- FIN DE SLIDERS DINÁMICOS E INTERACTIVOS --

// -- INICIO: BOTÓN ZOOM TO LAYER --
            var zoomToLayerControl = L.control({position: 'topleft'});
            zoomToLayerControl.onAdd = function (map) {
                // Creamos un contenedor con las clases nativas de Leaflet para que herede el diseño
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                var btn = L.DomUtil.create('a', '', container);
                
                // Usamos un ícono de expansión de la librería FontAwesome que ya tienes instalada
                btn.innerHTML = '<i class="fas fa-expand"></i>'; 
                btn.href = '#';
                btn.title = 'Zoom to Layer (Fit to points)';
                
                // Ajustes de estilo para que luzca idéntico a los botones de + y -
                btn.style.width = '30px';
                btn.style.height = '30px';
                btn.style.lineHeight = '30px';
                btn.style.textAlign = 'center';
                btn.style.textDecoration = 'none';
                btn.style.color = 'black';
                btn.style.display = 'block';

                // Evitamos que al presionar el botón se haga clic accidentalmente en el mapa detrás
                L.DomEvent.disableClickPropagation(container);

                // Función que se ejecuta al hacer clic
             L.DomEvent.on(btn, 'click', function(e) {
                 L.DomEvent.stop(e); // Evita que la página salte al inicio

                 // Retorna exactamente a la vista personalizada
                 map.setView([25.8, 53.8], 2);
             });

                return container;
            };
            zoomToLayerControl.addTo(map);
// -- FIN: BOTÓN ZOOM TO LAYER --

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Definimos las columnas de texto que queremos que se actualicen solas
    var columnasFiltro = ["Country", "State", "City", "Year", "Model", "TDS"];
    
    // Esperamos 1 segundo para asegurar que qgis2web haya creado los menús
    setTimeout(function() {
        if (typeof json_Evaporation_Studies_1 !== 'undefined') {
            columnasFiltro.forEach(function(columna) {
                var keyS = columna.replace(/[^a-zA-Z0-9_]/g, "");
                var selectElement = document.getElementById("sel_" + keyS);
                
                if (selectElement) {
                    // 1. Extraer valores únicos directamente del archivo .js actualizado
                    var valoresUnicos = new Set();
                    json_Evaporation_Studies_1.features.forEach(function(feature) {
                        var valor = feature.properties[columna];
                        if (valor !== null && valor !== undefined && String(valor).trim() !== "") {
                            valoresUnicos.add(String(valor));
                        }
                    });
                    
                    // 2. Limpiar las opciones viejas sin dejar espacios en blanco
                    selectElement.innerHTML = "";
                    
                    // 3. Ordenar alfabéticamente y crear las nuevas opciones
                    Array.from(valoresUnicos).sort().forEach(function(valor) {
                        var nuevaOpcion = document.createElement('option');
                        nuevaOpcion.value = valor;
                        nuevaOpcion.text = valor;
                        selectElement.appendChild(nuevaOpcion);
                    });
                }
            });
        }
    }, 1000);
});
// -- INICIO: ORDENAR Y LIMPIAR FILTROS --
    setTimeout(function() {
        // Agregamos todos los filtros de recuadro a la lista de limpieza
        var listFilters = ["sel_Country", "sel_State", "sel_City", "sel_Model", "sel_TDS", "sel_Year"];
        
        listFilters.forEach(function(id) {
            var sel = document.getElementById(id);
            if (sel) {
                var options = Array.from(sel.options);
                
                // LA MAGIA: Filtramos SOLO las opciones que tienen texto (esto ELIMINA la opción en blanco)
                var validOptions = options.filter(function(o) { return o.value.trim() !== ''; });
                
                // Ordenamos las opciones reales de la A a la Z
                validOptions.sort(function(a, b) {
                    return a.text.localeCompare(b.text);
                });
                
                // Limpiamos la caja y volvemos a inyectar solo las opciones válidas y ordenadas
                sel.innerHTML = "";
                validOptions.forEach(function(opt) { sel.appendChild(opt); });
            }
        });
    }, 1200);
    // -- FIN: ORDENAR Y LIMPIAR FILTROS --
// -- INICIO: CONVERTIR FILTROS EN DESPLEGABLES --
    setTimeout(function() {
        var filterDivs = document.querySelectorAll('.filterselect');
        filterDivs.forEach(function(div) {
            var label = div.querySelector('.filterlabel');

            // Si el contenedor tiene una etiqueta, procesamos el acordeón
            if (label) {
                // --- INICIO DEL CAMBIO ---
                // Interceptamos la etiqueta de Elevación y le cambiamos el nombre
                if (label.textContent.trim() === 'Elevation') {
                    label.innerHTML = 'Elevation (m)';
                }
                // --- FIN DEL CAMBIO ---

                // Creamos el menú colapsable (Acordeón)
                var details = document.createElement('details');
                var summary = document.createElement('summary');
                
                // Le damos formato de título al texto al lado de la flecha
                summary.innerHTML = "<strong>" + label.textContent + "</strong>";
                summary.style.cursor = "pointer";
                summary.style.paddingBottom = "5px";
                summary.style.outline = "none";

                details.appendChild(summary);

                // Movemos TODOS los elementos internos (cajas, sliders y botones clear) adentro del desplegable
                while (div.firstChild) {
                    if (div.firstChild === label) {
                        div.removeChild(div.firstChild); // Borramos el texto original para no duplicarlo
                    } else {
                        details.appendChild(div.firstChild);
                    }
                }
                // Insertamos el nuevo formato en el panel
                div.appendChild(details);
            }
        });
    }, 1500);
    // -- FIN: CONVERTIR FILTROS EN DESPLEGABLES --
</script>
