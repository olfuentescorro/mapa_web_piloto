        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var Filters = {"Country": "str","State": "str","City": "str","Year": "str", "Elevation": "int","Model": "str","TDS": "int"};
        
        function filterFunc() {
            var allFeatures = json_Evaporation_Studies_1.features.slice(0);

            // 1. Recopilar estado actual de todos los filtros
            var activeFilters = {};
            for (var key in Filters) {
                var keyS = key.replace(/[^a-zA-Z0-9_]/g, "");
                if (Filters[key] == "str" || Filters[key] == "bool") {
                    var sel = [];
                    var options = document.getElementById("sel_" + keyS).options;
                    for (var i=0; i < options.length; i++) {
                        if (options[i].selected) sel.push(options[i].value);
                    }
                    activeFilters[key] = { type: 'text', values: sel };
                } else if (Filters[key] == "int") {
                    var sliderObj = document.getElementById("div_" + keyS);
                    if (sliderObj && sliderObj.noUiSlider) {
                        var vals = sliderObj.noUiSlider.get();
                        activeFilters[key] = { type: 'int', min: parseFloat(vals[0]), max: parseFloat(vals[1]) };
                    }
                }
            }

            // Función auxiliar para saber si un punto pasa las reglas de un filtro dado
            function passesFilter(feature, filterKey) {
                var val = feature.properties[filterKey];
                var fData = activeFilters[filterKey];
                if (!fData) return true;
                if (fData.type === 'text') {
                    if (fData.values.length === 0) return true; // Si no hay nada seleccionado, pasa
                    return fData.values.indexOf(String(val)) !== -1;
                } else if (fData.type === 'int') {
                    if (val === null || val === undefined) return false;
                    var num = parseFloat(val);
                    return num >= fData.min && num <= fData.max;
                }
                return true;
            }

            // 2. Filtrar Puntos para el Mapa (Lógica AND estricta cruzada)
            var mapFeatures = allFeatures.filter(function(feat) {
                for (var key in Filters) {
                    if (!passesFilter(feat, key)) return false;
                }
                return true;
            });

            // 3. Evaluar opciones disponibles para los Desplegables y Sliders (Lógica OR interna)
            for (var currentFilterKey in Filters) {
                var keyS = currentFilterKey.replace(/[^a-zA-Z0-9_]/g, "");

                // -- A. LÓGICA PARA FILTROS DE TEXTO --
                if (Filters[currentFilterKey] == "str" || Filters[currentFilterKey] == "bool") {
                    var validOptions = new Set();
                    allFeatures.forEach(function(feat) {
                        var passesAllOther = true;
                        // Evaluamos contra todos los DEMÁS filtros, ignorando el propio
                        for (var otherKey in Filters) {
                            if (otherKey !== currentFilterKey) {
                                if (!passesFilter(feat, otherKey)) {
                                    passesAllOther = false;
                                    break;
                                }
                            }
                        }
                        if (passesAllOther) {
                            var v = feat.properties[currentFilterKey];
                            if (v !== null && v !== undefined && String(v).trim() !== "") {
                                validOptions.add(String(v));
                            }
                        }
                    });

                    var selectElement = document.getElementById("sel_" + keyS);
                    if (selectElement) {
                        selectElement.dataset.validOptions = JSON.stringify(Array.from(validOptions));
                        selectElement.dispatchEvent(new Event('updateCustomUI'));
                    }
                }
                // -- B. LÓGICA PARA RANGOS DINÁMICOS DE SLIDERS NUMÉRICOS --
                else if (Filters[currentFilterKey] == "int") {
                    var validNums = [];
                    allFeatures.forEach(function(feat) {
                        var passesAllOther = true;
                        for (var otherKey in Filters) {
                            if (otherKey !== currentFilterKey) {
                                if (!passesFilter(feat, otherKey)) {
                                    passesAllOther = false;
                                    break;
                                }
                            }
                        }
                        if (passesAllOther) {
                            var v = feat.properties[currentFilterKey];
                            if (v !== null && v !== undefined && !isNaN(parseFloat(v))) {
                                validNums.push(parseFloat(v));
                            }
                        }
                    });

                    var sliderObj = document.getElementById("div_" + keyS);
                    if (sliderObj && sliderObj.noUiSlider) {
                        if (validNums.length > 0) {
                            var newMin = Math.min.apply(null, validNums);
                            var newMax = Math.max.apply(null, validNums);
                            if (newMin === newMax) newMax = newMin + 1; // Evita el colapso de la barra
                            
                            var oldMin = parseFloat(sliderObj.noUiSlider.options.range.min);
                            var oldMax = parseFloat(sliderObj.noUiSlider.options.range.max);
                            
                            // Si los límites reales disponibles han cambiado
                            if (oldMin !== newMin || oldMax !== newMax) {
                                var currentHandles = sliderObj.noUiSlider.get();
                                // Inteligencia UX: verificamos si las perillas estaban puestas en los extremos
                                var isAtMinEdge = (parseFloat(currentHandles[0]) === oldMin);
                                var isAtMaxEdge = (parseFloat(currentHandles[1]) === oldMax);

                                // Ajustamos la pista física de la barra a los nuevos límites
                                sliderObj.noUiSlider.updateOptions({
                                    range: { 'min': newMin, 'max': newMax }
                                });
                                
                                // Si estaban en los extremos, las arrastramos automáticamente a los nuevos extremos
                                var nextHandleMin = isAtMinEdge ? newMin : parseFloat(currentHandles[0]);
                                var nextHandleMax = isAtMaxEdge ? newMax : parseFloat(currentHandles[1]);
                                sliderObj.noUiSlider.set([nextHandleMin, nextHandleMax]);

                                // Sincronizamos las cajas de texto
                                var inputs = sliderObj.querySelectorAll('input[type="number"]');
                                if (inputs.length >= 2) {
                                    inputs[0].min = newMin; inputs[0].max = newMax;
                                    inputs[1].min = newMin; inputs[1].max = newMax;
                                }
                            }
                        }
                    }
                }
                // -- FIN LÓGICA DE SLIDERS --
            }

            // 4. Actualización del Mapa
            cluster_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.addData(mapFeatures);
            cluster_Evaporation_Studies_1.addLayer(layer_Evaporation_Studies_1);
        }

            // 1. Función para escanear el archivo de datos y obtener el Mínimo y Máximo real
            function obtenerMinMax(features, propiedad) {
                var valores = features.map(function(f) { return parseFloat(f.properties[propiedad]); })
                                      .filter(function(v) { return !isNaN(v); });
                if (valores.length === 0) return [0, 100]; // Seguridad por si no hay datos
                var min = Math.min.apply(null, valores);
                var max = Math.max.apply(null, valores);
                if (min === max) max = min + 1; // Evita que el slider colapse si todos los valores son iguales
                return [min, max];
            }
            
            var featuresData = json_Evaporation_Studies_1.features;
            
            // 2. Función maestra creadora de sliders híbridos (Barra + Cajas de texto)
            function crearSliderDinamico(idVariable, titulo, paso) {
                var limites = obtenerMinMax(featuresData, idVariable);
                var minReal = limites[0];
                var maxReal = limites[1];

                var divContenedor = document.createElement('div');
                divContenedor.id = "div_" + idVariable;
                divContenedor.className= "filterselect";
                document.getElementById("menu").appendChild(divContenedor);
                
                // Etiqueta del título
                var labTitulo = document.createElement('div');
                labTitulo.innerHTML = titulo;
                labTitulo.className = 'filterlabel';
                divContenedor.appendChild(labTitulo);

                // Contenedor para las cajas de texto (Inputs)
                var divInputs = document.createElement('div');
                divInputs.style.display = "flex";
                divInputs.style.justifyContent = "space-between";
                divInputs.style.width = "90%";
                divInputs.style.marginBottom = "10px";
                divInputs.style.marginTop = "5px";

                // Input para el valor Mínimo
                var inputMin = document.createElement('input');
                inputMin.type = "number";
                inputMin.style.width = "45%";
                inputMin.min = minReal;
                inputMin.max = maxReal;
                inputMin.title = "Min " + titulo;

                // Input para el valor Máximo
                var inputMax = document.createElement('input');
                inputMax.type = "number";
                inputMax.style.width = "45%";
                inputMax.min = minReal;
                inputMax.max = maxReal;
                inputMax.title = "Max " + titulo;

                divInputs.appendChild(inputMin);
                divInputs.appendChild(inputMax);
                divContenedor.appendChild(divInputs);
                
                // Contenedor visual de la barra deslizante
                var divSlider = document.createElement('div');
                divSlider.style.marginTop = "10px";
                divSlider.style.marginBottom = "10px";
                divSlider.style.width = "90%";
                divContenedor.appendChild(divSlider);

                // Inicialización del motor de la barra
                noUiSlider.create(divSlider, {
                    start: [minReal, maxReal], 
                    connect: true,
                    range: { 'min': minReal, 'max': maxReal },
                    step: paso,
                    format: wNumb({ decimals: 0 })
                });

                divContenedor.noUiSlider = divSlider.noUiSlider;

                // A) Sincronización: Al mover el slider, se actualizan las cajas de texto
                divSlider.noUiSlider.on('update', function (values, handle) {
                    if (handle === 0) {
                        inputMin.value = values[0];
                    } else {
                        inputMax.value = values[1];
                    }
                });

                // B) Sincronización: Al escribir en las cajas de texto, se mueve el slider y SE APLICA EL FILTRO
                inputMin.addEventListener('change', function () {
                    divSlider.noUiSlider.set([this.value, null]);
                    filterFunc(); // Fuerza la actualización del mapa
                });
                inputMax.addEventListener('change', function () {
                    divSlider.noUiSlider.set([null, this.value]);
                    filterFunc(); // Fuerza la actualización del mapa
                });

                // C) Conectar el Slider al motor de filtros del mapa
                divSlider.noUiSlider.on('change', function() { filterFunc() });
                
                // Botón para limpiar el filtro
                var btnReset = document.createElement('div');
                btnReset.innerHTML = 'clear filter';
                btnReset.className = 'filterlabel';
                btnReset.onclick = function() {
                    divSlider.noUiSlider.reset(); // Regresa la barra a sus límites reales
                    filterFunc(); // Refresca el mapa
                };
                divContenedor.appendChild(btnReset);
            }

            // 3. Ejecutamos la función para fabricar los dos paneles matemáticos en pantalla
            crearSliderDinamico('Elevation', 'Elevation (m)', 1); // Pasos de 1 metro

<script>
document.addEventListener("DOMContentLoaded", function() {
    setTimeout(function() {
        var filterDivs = document.querySelectorAll('.filterselect');

        filterDivs.forEach(function(div) {
            var label = div.querySelector('.filterlabel');
            var select = div.querySelector('select');

            if (label) {
                var fieldName = label.textContent.trim();
                if (fieldName === 'Elevation') fieldName = 'Elevation (m)';
                label.innerHTML = fieldName;

                // Si es un filtro numérico (Sliders), solo lo envolvemos en Acordeón y terminamos
                if (!select) {
                    var detailsNum = document.createElement('details');
                    var summaryNum = document.createElement('summary');
                    summaryNum.innerHTML = "<strong>" + fieldName + "</strong>";
                    summaryNum.style.cursor = "pointer";
                    summaryNum.style.paddingBottom = "5px";
                    summaryNum.style.outline = "none";
                    detailsNum.appendChild(summaryNum);

                    while (div.firstChild) {
                        if (div.firstChild !== label) {
                            detailsNum.appendChild(div.firstChild);
                        } else {
                            div.removeChild(div.firstChild);
                        }
                    }
                    div.appendChild(detailsNum);
                    return;
                }

                // ESTRUCTURA BASE PARA FILTROS DE TEXTO
                var details = document.createElement('details');
                var summary = document.createElement('summary');
                summary.innerHTML = "<strong>" + fieldName + "</strong>";
                summary.style.cursor = "pointer";
                summary.style.paddingBottom = "5px";
                summary.style.outline = "none";
                details.appendChild(summary);

                // Caja de Etiquetas Activas
                var tagsContainer = document.createElement('div');
                tagsContainer.style.marginBottom = "8px";
                tagsContainer.style.display = "flex";
                tagsContainer.style.flexWrap = "wrap";
                tagsContainer.style.gap = "4px";
                details.appendChild(tagsContainer);

                // Caja de Búsqueda
                var inputSearch = document.createElement('input');
                inputSearch.type = "text";
                inputSearch.placeholder = "Buscar o seleccionar...";
                inputSearch.style.width = "100%";
                inputSearch.style.marginBottom = "5px";
                inputSearch.style.padding = "6px";
                inputSearch.style.fontSize = "12px";
                inputSearch.style.boxSizing = "border-box";
                details.appendChild(inputSearch);

                // Lista de Opciones Disponibles
                var optionsList = document.createElement('div');
                optionsList.style.border = "1px solid #ddd";
                optionsList.style.maxHeight = "160px";
                optionsList.style.overflowY = "auto";
                optionsList.style.backgroundColor = "#fff";
                optionsList.style.width = "100%";
                optionsList.style.boxSizing = "border-box";
                details.appendChild(optionsList);

                select.style.display = "none"; // Ocultar el selector nativo

                // Rescatar universo completo de opciones de la DB original
                var todasLasOpciones = new Set();
                if (typeof json_Evaporation_Studies_1 !== 'undefined') {
                    json_Evaporation_Studies_1.features.forEach(function(f) {
                        var v = f.properties[fieldName];
                        if (v !== null && v !== undefined && String(v).trim() !== "") {
                            todasLasOpciones.add(String(v));
                        }
                    });
                }
                var arrayMaestro = Array.from(todasLasOpciones).sort(function(a, b) {
                    return a.localeCompare(b);
                });
                select.dataset.validOptions = JSON.stringify(arrayMaestro);

                // MOTOR REACTIVO UI (Se dispara cada vez que filterFunc() calcula disponibilidades)
                function renderUI() {
                    var validOptions = JSON.parse(select.dataset.validOptions || '[]');
                    var searchVal = inputSearch.value.toLowerCase();

                    // 1. DIBUJAR ETIQUETAS
                    tagsContainer.innerHTML = "";
                    var selectedVals = [];
                    for (var i = 0; i < select.options.length; i++) {
                        if (select.options[i].selected) {
                            var val = select.options[i].value;
                            selectedVals.push(val);

                            var tag = document.createElement('span');
                            tag.style.backgroundColor = "#0078A8"; // Color etiqueta
                            tag.style.color = "white";
                            tag.style.padding = "3px 8px";
                            tag.style.borderRadius = "12px";
                            tag.style.fontSize = "11px";
                            tag.style.display = "inline-flex";
                            tag.style.alignItems = "center";
                            tag.style.gap = "6px";
                            tag.innerHTML = val + ' <span title="Remove" style="cursor:pointer; font-weight:bold; font-size:14px;">&times;</span>';

                            tag.querySelector('span').onclick = (function(optionIndex) {
                                return function(e) {
                                    e.stopPropagation();
                                    select.options[optionIndex].selected = false;
                                    filterFunc(); // Eliminar etiqueta recalcula todo
                                };
                            })(i);
                            tagsContainer.appendChild(tag);
                        }
                    }

                    // 2. DIBUJAR OPCIONES DISPONIBLES (No seleccionadas aún)
                    optionsList.innerHTML = "";
                    var hasVisibleOptions = false;

                    arrayMaestro.forEach(function(valTexto) {
                        if (validOptions.indexOf(valTexto) !== -1 && selectedVals.indexOf(valTexto) === -1) {
                            if (searchVal === "" || valTexto.toLowerCase().indexOf(searchVal) > -1) {
                                hasVisibleOptions = true;
                                var item = document.createElement('div');
                                item.textContent = valTexto;
                                item.style.padding = "6px 8px";
                                item.style.cursor = "pointer";
                                item.style.fontSize = "12px";
                                item.style.borderBottom = "1px solid #f9f9f9";

                                item.onmouseover = function() { this.style.backgroundColor = "#f0f8ff"; };
                                item.onmouseout = function() { this.style.backgroundColor = "#fff"; };

                                // Selección por CLIC
                                item.onclick = function(e) {
                                    e.stopPropagation();
                                    seleccionarOpcion(valTexto);
                                };

                                optionsList.appendChild(item);
                            }
                        }
                    });

                    if (!hasVisibleOptions) {
                        var noItem = document.createElement('div');
                        noItem.textContent = "No hay opciones disponibles";
                        noItem.style.padding = "6px 8px";
                        noItem.style.fontSize = "12px";
                        noItem.style.color = "#888";
                        optionsList.appendChild(noItem);
                    }
                }

                select.addEventListener('updateCustomUI', renderUI);

                // Función de Selección Centralizada
                function seleccionarOpcion(valTexto) {
                    var encontrada = false;
                    for (var i = 0; i < select.options.length; i++) {
                        if (select.options[i].value === valTexto) {
                            select.options[i].selected = true;
                            encontrada = true; break;
                        }
                    }
                    if (!encontrada) { // Redundancia de seguridad
                        var opt = document.createElement('option');
                        opt.value = valTexto; opt.text = valTexto; opt.selected = true;
                        select.appendChild(opt);
                    }
                    inputSearch.value = ""; // Limpia el buscador
                    filterFunc(); // Gatilla efecto cascada
                }

                // EVENTOS DEL BUSCADOR
                inputSearch.addEventListener('input', renderUI);
                inputSearch.addEventListener('keydown', function(e) {
                    // Selección con ENTER sobre el primer elemento coincidente
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        var primerItem = optionsList.querySelector('div[style*="cursor: pointer"]');
                        if (primerItem) seleccionarOpcion(primerItem.textContent);
                    }
                });
                inputSearch.addEventListener('click', function(e) { e.stopPropagation(); });

                // Ensamblar DOM
                while (div.firstChild) {
                    if (div.firstChild === label) {
                        div.removeChild(div.firstChild);
                    } else {
                        details.appendChild(div.firstChild);
                    }
                }
                div.appendChild(details);

                // Disparo inicial
                renderUI();
            }
        });
    }, 1500); // Dar tiempo a Qgis2web a generar la base
});
