        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var Filters = {"Country": "str","State": "str","City": "str","Year": "str", "Elevation": "int","Model": "str","TDS": "str"};
        
        function filterFunc() {
            var features = json_Evaporation_Studies_1.features.slice(0);
            try{
              for (key in Filters){
                keyS = key.replace(/[^a-zA-Z0-9_]/g, "");
                
                // 1. Filtrado de Textos
                if (Filters[key] == "str" || Filters[key] == "bool"){
                  var selection = [];
                  var options = document.getElementById("sel_" + keyS).options;
                  for (var i=0; i < options.length; i++) {
                    if (options[i].selected) selection.push(options[i].value);
                  }
                  try{
                    if (key in features[0].properties){
                      for (i = features.length - 1; i >= 0; --i){
                        if (selection.indexOf(features[i].properties[key])<0 && selection.length>0) {
                          features.splice(i,1);
                        }
                      }
                    }
                  } catch(err){
                  }
                }
                
                // 2. Filtrado del Slider Numérico
                if (Filters[key] == "int"){
                  var sliderVals = document.getElementById("div_" + keyS).noUiSlider.get();
                  try{
                    if (key in features[0].properties){
                      for (i = features.length - 1; i >= 0; --i){
                        if (parseInt(features[i].properties[key]) < sliderVals[0] || parseInt(features[i].properties[key]) > sliderVals[1]){
                          features.splice(i,1); 
                        }
                      }
                    }
                  } catch(err){
                  }
                }
              }
            } catch(err){
            }
            
            // -- INICIO LÓGICA DE FILTROS EN CASCADA --
            // Recorremos nuevamente los filtros para deshabilitar las opciones sin datos
            for (var keyCascada in Filters) {
                if (Filters[keyCascada] == "str" || Filters[keyCascada] == "bool") {
                    var keySCascada = keyCascada.replace(/[^a-zA-Z0-9_]/g, "");
                    var selectElement = document.getElementById("sel_" + keySCascada);
                    
                    // a. Hacemos un listado de los valores que existen en los puntos restantes
                    var valoresDisponibles = [];
                    for (var j = 0; j < features.length; j++) {
                        var val = features[j].properties[keyCascada];
                        if (val !== null && val !== undefined) {
                            valoresDisponibles.push(String(val));
                        }
                    }
                    
                    // b. Apagamos o encendemos las opciones del menú visualmente
                    if (selectElement) {
                        for (var k = 0; k < selectElement.options.length; k++) {
                            var opcion = selectElement.options[k];
                            if (opcion.value !== "") {
                                // Si la opción NO está en los valores disponibles y NO está seleccionada por el usuario
                                if (valoresDisponibles.indexOf(opcion.value) === -1 && !opcion.selected) {
                                    opcion.disabled = true;           // Evita que se le haga clic
                                    opcion.style.color = "#d3d3d3";   // La pinta de gris claro
                                } else {
                                    opcion.disabled = false;          // La vuelve a habilitar
                                    opcion.style.color = "#000000";   // La pinta de negro normal
                                }
                            }
                        }
                    }
                }
            }
            // -- FIN LÓGICA DE FILTROS EN CASCADA --

            // 3. Actualización del Mapa y Clústeres
            cluster_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.clearLayers();
            layer_Evaporation_Studies_1.addData(features);
            cluster_Evaporation_Studies_1.addLayer(layer_Evaporation_Studies_1);
        }

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Definimos las columnas de texto que queremos que se actualicen solas
    var columnasFiltro = ["Country", "State", "City", "Year", "Model", "TDS"];
    
    // Esperamos 1 segundo para asegurar que qgis2web haya creado los menús
    setTimeout(function() {
        if (typeof json_Evaporation_Studies_1 !== 'undefined') {
            columnasFiltro.forEach(function(columna) {
                var keyS = columna.replace(/[^a-zA-Z0-9_]/g, "");
                var selectElement = document.getElementById("sel_" + keyS);
                
                if (selectElement) {
                    // 1. Extraer valores únicos directamente del archivo .js actualizado
                    var valoresUnicos = new Set();
                    json_Evaporation_Studies_1.features.forEach(function(feature) {
                        var valor = feature.properties[columna];
                        if (valor !== null && valor !== undefined && String(valor).trim() !== "") {
                            valoresUnicos.add(String(valor));
                        }
                    });
                    
                    // 2. Limpiar las opciones viejas dejando solo el espacio en blanco por defecto
                    selectElement.innerHTML = "<option value='' unselected></option>";
                    
                    // 3. Ordenar alfabéticamente y crear las nuevas opciones
                    Array.from(valoresUnicos).sort().forEach(function(valor) {
                        var nuevaOpcion = document.createElement('option');
                        nuevaOpcion.value = valor;
                        nuevaOpcion.text = valor;
                        selectElement.appendChild(nuevaOpcion);
                    });
                }
            });
        }
    }, 1000);
});
// -- INICIO: ORDENAR FILTROS ALFABÉTICAMENTE --
    setTimeout(function() {
        ["sel_Country", "sel_State", "sel_City"].forEach(function(id) {
            var sel = document.getElementById(id);
            if (sel) {
                // Convertimos las opciones a un arreglo (Array)
                var options = Array.from(sel.options);
                
                // Separamos la opción vacía (el botón transparente de reset) del resto de opciones
                var firstOption = options.find(function(o) { return o.value === ''; });
                var otherOptions = options.filter(function(o) { return o.value !== ''; });
                
                // Ordenamos las opciones reales de la A a la Z
                otherOptions.sort(function(a, b) {
                    return a.text.localeCompare(b.text);
                });
                
                // Limpiamos la caja y volvemos a inyectar todo en el nuevo orden
                sel.innerHTML = "";
                if (firstOption) { sel.appendChild(firstOption); }
                otherOptions.forEach(function(opt) { sel.appendChild(opt); });
            }
        });
    }, 1000); // Se ejecuta un segundo después de cargar para asegurar que los datos ya están en la página
// -- FIN: ORDENAR FILTROS ALFABÉTICAMENTE --
// -- INICIO: CONVERTIR FILTROS EN DESPLEGABLES --
    setTimeout(function() {
        var filterDivs = document.querySelectorAll('.filterselect');
        filterDivs.forEach(function(div) {
            var label = div.querySelector('.filterlabel');

            // Si el contenedor tiene una etiqueta, procesamos el acordeón
            if (label) {
                // --- INICIO DEL CAMBIO ---
                // Interceptamos la etiqueta de Elevación y le cambiamos el nombre
                if (label.textContent.trim() === 'Elevation') {
                    label.innerHTML = 'Elevation (m)';
                }
                // --- FIN DEL CAMBIO ---

                // Creamos el menú colapsable (Acordeón)
                var details = document.createElement('details');
                var summary = document.createElement('summary');
                
                // Le damos formato de título al texto al lado de la flecha
                summary.innerHTML = "<strong>" + label.textContent + "</strong>";
                summary.style.cursor = "pointer";
                summary.style.paddingBottom = "5px";
                summary.style.outline = "none";

                details.appendChild(summary);

                // Movemos TODOS los elementos internos (cajas, sliders y botones clear) adentro del desplegable
                while (div.firstChild) {
                    if (div.firstChild === label) {
                        div.removeChild(div.firstChild); // Borramos el texto original para no duplicarlo
                    } else {
                        details.appendChild(div.firstChild);
                    }
                }
                // Insertamos el nuevo formato en el panel
                div.appendChild(details);
            }
        });
    }, 1500);
    // -- FIN: CONVERTIR FILTROS EN DESPLEGABLES --
</script>
